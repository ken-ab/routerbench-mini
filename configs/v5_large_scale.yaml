learned_router:
  model_family: ridge
  alpha: 0.1
  tfidf:
    ngram_range: [1, 2]
    min_df: 2
    max_df: 1.0
    max_features: 1500
    sublinear_tf: true
    strip_accents: unicode
    norm: l2
  threshold_rule: highest_oof_accuracy_among_non_degenerate_then_lowest_cost_and_strong_rate
  minimum_strong_rate: 0.05
  maximum_strong_rate: 0.95

reflection_router:
  feature_mode: response_only
  logistic_regression_c: 0.5
  calibration: sigmoid
  inner_folds: 3
  threshold_grid_start: 0.05
  threshold_grid_stop: 1.0
  threshold_grid_step: 0.05
  max_reflection_rounds: 1
  threshold_rule: highest_oof_accuracy_among_non_degenerate_then_lowest_cost_and_strong_rate
  minimum_strong_rate: 0.05
  maximum_strong_rate: 0.95

task_aware_router:
  risk_threshold: 2.0
  frozen_from_version: V2

near_duplicate:
  question_cosine_threshold: 0.95
  combined_cosine_threshold: 0.98
